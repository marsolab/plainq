# Default values for the PlainQ chart.
# This is a YAML-formatted file.
# Declare variables to be passed into the templates.

# -- Number of PlainQ replicas to run.
# IMPORTANT: When storage.driver is "sqlite" this MUST stay at 1. SQLite is a
# single-file embedded database backed by a single PersistentVolume (RWO) and
# cannot be safely shared across replicas. Only scale beyond 1 with the
# "postgres" driver.
replicaCount: 1

image:
  # -- Container image repository.
  repository: ghcr.io/marsolab/plainq
  # -- Image pull policy.
  pullPolicy: IfNotPresent
  # -- Image tag. Defaults to the chart appVersion when left empty.
  tag: ""

# -- Image pull secrets for private registries (e.g. ghcr.io).
# Each entry is an object with a "name" key referencing an existing secret.
imagePullSecrets: []
# - name: ghcr-credentials

# -- Override the chart name portion of resource names.
nameOverride: ""
# -- Fully override the generated resource name.
fullnameOverride: ""

serviceAccount:
  # -- Whether to create a ServiceAccount.
  create: true
  # -- Annotations to add to the ServiceAccount (e.g. for IRSA / workload identity).
  annotations: {}
  # -- Name of the ServiceAccount. Generated from the fullname when empty.
  name: ""
  # -- Whether the pod should mount the ServiceAccount API token.
  automountServiceAccountToken: false

# -- Annotations added to every PlainQ pod.
podAnnotations: {}

# -- Labels added to every PlainQ pod.
podLabels: {}

# -- Pod-level security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  # fsGroup ensures the mounted SQLite volume is writable by the nonroot user.
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context. Hardened for a distroless nonroot image.
securityContext:
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  # -- Kubernetes Service type.
  type: ClusterIP
  # -- Port exposing the gRPC queue API (container port 8080).
  grpcPort: 8080
  # -- Port exposing the HTTP server: Houston UI, REST auth API, /health, /metrics (container port 8081).
  httpPort: 8081
  # -- Extra annotations for the Service (e.g. to mark the gRPC port for a mesh/LB).
  annotations: {}

ingress:
  # -- Enable the Ingress resource.
  enabled: false
  # -- IngressClass name.
  className: ""
  # -- Ingress annotations. gRPC needs a backend-protocol hint on most controllers.
  # For NGINX gRPC routing, set this on the gRPC host:
  #   nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
  annotations: {}
  hosts:
    # HTTP host serving the Houston UI / REST API.
    - host: plainq.example.com
      paths:
        - path: /
          pathType: Prefix
          # Which Service port to route to: "http" or "grpc".
          port: http
    # gRPC host. Keep on its own host so gRPC-specific annotations do not
    # bleed onto the HTTP host. Requires backend-protocol: GRPC on the controller.
    - host: grpc.plainq.example.com
      paths:
        - path: /
          pathType: Prefix
          port: grpc
  # -- TLS configuration. gRPC over Ingress effectively requires TLS (HTTP/2).
  tls: []
  #  - secretName: plainq-tls
  #    hosts:
  #      - plainq.example.com
  #      - grpc.plainq.example.com

# -- Resource requests and limits for the PlainQ container.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  # -- Enable a HorizontalPodAutoscaler.
  # NOTE: Autoscaling ONLY applies when storage.driver is "postgres". SQLite
  # mode is pinned to a single replica and the HPA template is skipped.
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# -- Node selector for pod scheduling.
nodeSelector: {}

# -- Tolerations for pod scheduling.
tolerations: []

# -- Affinity rules for pod scheduling.
affinity: {}

storage:
  # -- Storage driver: "sqlite" (default, single replica) or "postgres".
  driver: sqlite

  sqlite:
    # -- Path to the SQLite database file inside the container. The parent
    # directory is mounted from the PersistentVolumeClaim below.
    path: /data/plainq.db
    persistence:
      # -- Create a PersistentVolumeClaim for the SQLite data directory.
      enabled: true
      # -- Size of the data volume.
      size: 8Gi
      # -- StorageClass name. Empty uses the cluster default.
      storageClass: ""
      # -- Access mode. SQLite requires a single writer, so ReadWriteOnce.
      accessMode: ReadWriteOnce
      # -- Annotations for the PVC.
      annotations: {}

  postgres:
    # -- PostgreSQL DSN. Used only when an existingSecret is NOT provided.
    # Prefer existingSecret to avoid storing credentials in values.
    dsn: ""
    # -- Name of an existing Secret holding the Postgres DSN.
    existingSecret: ""
    # -- Key within existingSecret that holds the DSN.
    secretKey: dsn

auth:
  # -- Enable authentication. When true a JWT secret MUST be provided via
  # auth.jwtSecret or auth.existingSecret, otherwise rendering fails.
  enabled: true
  # -- HMAC secret used to sign access/refresh tokens. Stored in a generated
  # Secret. Leave empty and use existingSecret in production.
  jwtSecret: ""
  # -- Name of an existing Secret holding the JWT secret. Takes precedence
  # over auth.jwtSecret when set.
  existingSecret: ""
  # -- Key within the Secret (generated or existing) that holds the JWT secret.
  secretKey: jwt-secret

# -- Non-secret server configuration mapped to CLI flags.
config:
  # -- Log level: "debug", "info", "warning", "error".
  logLevel: info
  # -- HTTP route for the health endpoint (on the http port).
  healthRoute: /health
  # -- HTTP route for the metrics endpoint (on the http port).
  metricsRoute: /metrics

# -- Extra raw CLI flags appended to the "serve" command, e.g.
#   - "-cors=false"
#   - "-profiler"
extraArgs: []

# -- Additional environment variables for the container.
env: []
# - name: TZ
#   value: UTC

# -- Additional envFrom sources (configMapRef / secretRef).
envFrom: []
# - secretRef:
#     name: extra-secrets

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# -- Prometheus Operator integration.
metrics:
  serviceMonitor:
    # -- Create a ServiceMonitor scraping the HTTP /metrics endpoint. Requires
    # the Prometheus Operator CRDs (monitoring.coreos.com) to be installed.
    enabled: false
    # -- Scrape interval.
    interval: 30s
    # -- Per-scrape timeout.
    scrapeTimeout: 10s
    # -- Extra labels for the ServiceMonitor. Many operator installs require a
    # release label to select it, e.g. release: kube-prometheus-stack.
    labels: {}
    # -- Extra annotations for the ServiceMonitor.
    annotations: {}
    # -- Prometheus relabeling rules applied before scraping.
    relabelings: []
    # -- Prometheus relabeling rules applied to scraped samples.
    metricRelabelings: []
