{{- if eq .Values.storage.driver "sqlite" -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "plainq.fullname" . }}
  labels:
    {{- include "plainq.labels" . | nindent 4 }}
spec:
  # SQLite is single-writer: pin to one replica regardless of replicaCount.
  replicas: 1
  serviceName: {{ include "plainq.fullname" . }}
  selector:
    matchLabels:
      {{- include "plainq.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll pods when the secret changes so the new JWT secret is picked up.
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "plainq.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "plainq.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        {{- include "plainq.containerSpec" . | nindent 8 }}
      volumes:
        {{- include "plainq.volumes" . | nindent 8 }}
        {{- if .Values.storage.sqlite.persistence.enabled }}
        # Mounts the PersistentVolumeClaim defined in templates/pvc.yaml.
        - name: data
          persistentVolumeClaim:
            claimName: {{ printf "%s-data" (include "plainq.fullname" .) }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
