{{- if .Values.auth.enabled }}
{{- if not .Values.auth.existingSecret }}
{{- if not .Values.auth.jwtSecret }}
{{- fail "auth.enabled is true but no JWT secret was provided. Set auth.jwtSecret, or point auth.existingSecret at a pre-created Secret (recommended for production)." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-auth" (include "plainq.fullname" .) }}
  labels:
    {{- include "plainq.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.secretKey }}: {{ .Values.auth.jwtSecret | quote }}
{{- end }}
{{- end }}
{{- if and (eq .Values.storage.driver "postgres") (not .Values.storage.postgres.existingSecret) }}
{{- if not .Values.storage.postgres.dsn }}
{{- fail "storage.driver is postgres but no DSN was provided. Set storage.postgres.dsn, or point storage.postgres.existingSecret at a pre-created Secret (recommended for production)." }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-postgres" (include "plainq.fullname" .) }}
  labels:
    {{- include "plainq.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.storage.postgres.secretKey }}: {{ .Values.storage.postgres.dsn | quote }}
{{- end }}
