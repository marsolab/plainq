version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/server/service/account/litestore/queries"
    schema: "internal/server/sqlc/sqlite/schema.sql"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/server/service/account/litestore/sqlcgen"
        sql_package: "database/sql"
        emit_json_tags: false
        emit_interface: false
        emit_prepared_queries: false
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_methods_with_db_argument: false
        emit_pointers_for_null_types: false

  - engine: "postgresql"
    queries: "internal/server/service/account/pgstore/queries"
